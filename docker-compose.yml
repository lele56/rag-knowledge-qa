# ============================================================
# 知识库问答助手 — 基础设施服务
#
# 启动所有依赖服务:
#   docker-compose up -d
#
# 单独启动某个服务:
#   docker-compose up -d redis
#   docker-compose up -d qdrant
#   docker-compose up -d neo4j
#
# 停止:
#   docker-compose down
#
# 停止并删除数据:
#   docker-compose down -v
# ============================================================

version: "3.8"

services:
  # ---------- Redis 缓存 ----------
  redis:
    image: redis:7-alpine
    container_name: kb-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ---------- Qdrant 向量数据库 ----------
  qdrant:
    image: qdrant/qdrant:latest
    container_name: kb-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ---------- Neo4j 图数据库 ----------
  neo4j:
    image: neo4j:5-community
    container_name: kb-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # HTTP
      - "7687:7687"   # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    environment:
      NEO4J_AUTH: neo4j/password123
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_max__size: 512m
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password123", "RETURN 1"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
  qdrant_data:
  neo4j_data:
  neo4j_logs: